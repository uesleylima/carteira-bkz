
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira BKZ Private - Editor v6.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a1628;color:#c8d6e5;min-height:100vh}
.header{text-align:center;padding:30px 20px 10px}
.header h1{font-size:28px;color:#fff;letter-spacing:2px}
.header h1 span.pipe{color:#c8d6e5;margin:0 4px}
.header h2{font-size:16px;color:#d4a84b;margin-top:4px;font-weight:400}
.client-section{text-align:center;margin:15px auto;max-width:500px}
.client-section label{font-size:11px;letter-spacing:2px;color:#7f8c9b;display:block;margin-bottom:6px}
.client-section input{width:100%;padding:12px 16px;background:#1a2744;border:1px solid #2a3a5c;border-radius:6px;color:#fff;font-size:16px;text-align:center}
.timestamp{text-align:center;color:#5a6a7a;font-size:12px;margin:8px 0 20px}
.timestamp strong{color:#8a9aaa}
.toolbar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:0 20px;margin-bottom:10px}
.toolbar button{padding:10px 22px;border:1px solid #2a4a6a;background:transparent;color:#8ac;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:1.5px;font-weight:600;transition:all .2s}
.toolbar button:hover{background:#1a3a5a;border-color:#4a8abf}
.toolbar button.primary{background:#0e7c7b;border-color:#0e7c7b;color:#fff}
.toolbar button.primary:hover{background:#0a5f5e}
.toolbar button.send{border-color:#3a4a5a;color:#5a7a8a}
.new-client-wrap{text-align:right;padding:0 30px;margin:5px 0}
.new-client-wrap a{color:#3a5a7a;font-size:11px;letter-spacing:1px;text-decoration:none;cursor:pointer}
.new-client-wrap a:hover{color:#5a8abf}
.legend{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:12px 20px;margin:5px 20px;background:#0d1e36;border-radius:8px;border:1px solid #1a2a44}
.legend span{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;color:#7f8c9b}
.legend span::before{content:'';width:8px;height:8px;border-radius:50%;display:inline-block}
.legend .perf::before{background:#00e676}
.legend .manter::before{background:#2e7d32}
.legend .acomp::before{background:#ff9800}
.legend .encerr::before{background:#ef5350}
.drag-hint{text-align:center;color:#4a5a6a;font-size:11px;margin:8px 0;letter-spacing:1px}
.tabs-container{display:flex;gap:0;padding:0 20px;margin:10px 0;border-bottom:1px solid #1a2a44;overflow-x:auto}
.tabs-container button{padding:12px 24px;background:transparent;border:none;border-bottom:2px solid transparent;color:#5a7a8a;font-size:12px;letter-spacing:1.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.tabs-container button.active{color:#fff;border-bottom-color:#d4a84b}
.tabs-container button:hover{color:#aab}
.sheet{display:none;padding:10px 20px;overflow-x:auto}
.sheet.active{display:block}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px}
thead th{background:#0d1e36;color:#8a9aaa;font-size:10px;letter-spacing:1.5px;font-weight:600;padding:12px 8px;text-align:left;border-bottom:2px solid #1a2a44;position:sticky;top:0;z-index:1}
tbody tr{border-bottom:1px solid #111d30;transition:background .15s}
tbody tr:hover{background:#121f35}
tbody tr.bkz-origin{background:rgba(212,168,75,0.08)}
tbody tr.bkz-origin:hover{background:rgba(212,168,75,0.14)}
tbody td{padding:10px 8px;color:#c8d6e5;vertical-align:middle}
tbody td.monetary{text-align:right;font-variant-numeric:tabular-nums}
tbody td.center{text-align:center}
tfoot tr{background:#0d1e36;border-top:2px solid #1a2a44}
tfoot td{padding:12px 8px;font-weight:700;color:#fff;font-size:13px}
tfoot td.monetary{text-align:right;font-variant-numeric:tabular-nums}
.actions-btn{background:none;border:none;color:#5a7a8a;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px;transition:all .15s}
.actions-btn:hover{background:#1a2a44;color:#fff}
.ctx-menu{position:absolute;background:#1a2744;border:1px solid #2a3a5c;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;min-width:160px;padding:4px 0;display:none}
.ctx-menu.show{display:block}
.ctx-menu button{display:block;width:100%;text-align:left;padding:8px 16px;background:none;border:none;color:#c8d6e5;font-size:12px;cursor:pointer;transition:background .1s}
.ctx-menu button:hover{background:#243454}
.ctx-menu button.danger{color:#ef5350}
.ctx-menu button.danger:hover{background:#3a1a1a}
@media(max-width:768px){.toolbar{gap:6px}.toolbar button{padding:8px 14px;font-size:10px}.legend{gap:12px}}
</style>
</head>
<body>
<div class="header">
<h1><span>BKZ</span><span class="pipe">|</span><span>Capital</span></h1>
<h2>BKZ Private</h2>
</div>
<div class="client-section">
<label>NOME DO CLIENTE</label>
<input type="text" id="cn" value="" placeholder="Digite o nome do cliente" aria-label="Nome do cliente">
</div>
<div class="timestamp">Atualizado em: <strong id="ud"></strong></div>
<div class="toolbar">
<button onclick="toggleEdit()" id="et">ATIVAR MODO EDI\u00C7\u00C3O</button>
<button onclick="saveData()">SALVAR ALTERA\u00C7\u00D5ES</button>
<button onclick="exportExcel()">EXPORTAR EXCEL</button>
<button class="send" onclick="sendToClient()">ENVIAR PARA CLIENTE</button>
<button class="primary" onclick="importAssets()">\u21EA IMPORTAR ATIVOS</button>
</div>
<div class="new-client-wrap" id="ncWrap"><a onclick="newClient()">+ NOVO CLIENTE</a></div>
<div class="legend">
<span class="perf">PERFORMANCE DESTAQUE</span>
<span class="manter">MANTER POSI\u00C7\u00C3O</span>
<span class="acomp">ACOMPANHAR</span>
<span class="encerr">PROPOSTA ENCERRAMENTO</span>
</div>
<div class="drag-hint">\u21D4 <strong>ARRASTE AS ABAS</strong> PARA REORDENAR</div>
<div class="tabs-container" id="tabs"></div>
<div id="sheets"></div>
<div class="ctx-menu" id="ctxMenu">
<button onclick="editRow()">\u270F Editar</button>
<button onclick="colorRow()">\uD83C\uDFA8 Colorir</button>
<button onclick="endRow()">\u23F9 Encerrar</button>
<button class="danger" onclick="deleteRow()">\uD83D\uDDD1 Excluir</button>
</div>
<script>
const TABS=['EMISS\u00D5ES PR\u00D3PRIAS TERCEIROS','MULTIMERCADO','A\u00C7\u00D5ES \u00C0 VISTA','FUNDOS IMOBILI\u00C1RIOS','OPERA\u00C7\u00D5ES ESTRUTURADAS'];
const COLS=['ATIVO','EMISSOR','INDEX','TAXA','%','TAXA CONTRAT.','APLICA\u00C7\u00C3O','VENCIMENTO','QTD','GARANTIA','VALOR APLICADO','SALDO BRUTO','IR','IOF','SALDO L\u00CDQUIDO','MERCADO SEC.','A\u00C7\u00D5ES'];
const MONEY_COLS=[10,11,12,13,14,15];
let editMode=false,activeTab=0,ctxRow=null;
function init(){
document.getElementById('ud').textContent=new Date().toLocaleString('pt-BR');
const tabsEl=document.getElementById('tabs'),sheetsEl=document.getElementById('sheets');
TABS.forEach((name,i)=>{
const btn=document.createElement('button');
btn.textContent=name;
btn.className=i===0?'active':'';
btn.onclick=()=>switchTab(i);
tabsEl.appendChild(btn);
const sheet=document.createElement('div');
sheet.className='sheet'+(i===0?' active':'');
sheet.id='sheet-'+i;
sheet.innerHTML=buildTable();
sheetsEl.appendChild(sheet);
});
document.addEventListener('click',e=>{if(!e.target.closest('.ctx-menu')&&!e.target.closest('.actions-btn'))document.getElementById('ctxMenu').classList.remove('show');});
}
function buildTable(){
let h='<table><thead><tr>';
COLS.forEach(c=>h+='<th>'+c+'</th>');
h+='</tr></thead><tbody></tbody>';
h+='<tfoot><tr>';
COLS.forEach((c,i)=>{
if(i===0)h+='<td colspan="10" style="font-weight:700">TOTAL</td>';
else if(i>=10&&i<=15)h+='<td class="monetary" data-total-col="'+i+'">R$ 0,00</td>';
else if(i>0&&i<10)return;
else if(i===16)h+='<td></td>';
});
h+='</tr></tfoot></table>';
return h;
}
function switchTab(i){
activeTab=i;
document.querySelectorAll('.tabs-container button').forEach((b,j)=>b.className=j===i?'active':'');
document.querySelectorAll('.sheet').forEach((s,j)=>s.className='sheet'+(j===i?' active':''));
}
function addRow(sheetIdx){
const tbody=document.querySelector('#sheet-'+(sheetIdx!==undefined?sheetIdx:activeTab)+' tbody');
const tr=document.createElement('tr');
for(let i=0;i<COLS.length;i++){
const td=document.createElement('td');
if(MONEY_COLS.includes(i)){td.className='monetary';td.textContent='-';}
else if(i===8){td.className='center';td.textContent='-';}
else if(i===16){td.innerHTML='<button class="actions-btn" onclick="showCtx(event,this.parentElement.parentElement)">\u22EE</button>';}
else{td.textContent='-';}
tr.appendChild(td);
}
tbody.appendChild(tr);
recalcTotals(sheetIdx!==undefined?sheetIdx:activeTab);
return tr;
}
function showCtx(e,row){
e.stopPropagation();
ctxRow=row;
const menu=document.getElementById('ctxMenu');
menu.style.top=(e.pageY)+'px';
menu.style.left=Math.min(e.pageX,window.innerWidth-180)+'px';
menu.classList.add('show');
}
function editRow(){if(!ctxRow)return;ctxRow.querySelectorAll('td:not(:last-child)').forEach(td=>{td.contentEditable='true';td.style.outline='1px solid #2a4a6a';});hideCtx();}
function colorRow(){
if(!ctxRow)return;
const colors=['','bkz-origin','perf-row','manter-row','acomp-row','encerr-row'];
const cur=colors.findIndex(c=>ctxRow.classList.contains(c))||0;
ctxRow.className=colors[(cur+1)%colors.length]||'';
hideCtx();
}
function endRow(){if(!ctxRow)return;ctxRow.style.opacity='0.4';ctxRow.style.textDecoration='line-through';hideCtx();}
function deleteRow(){if(!ctxRow)return;if(confirm('Excluir esta linha?')){const idx=activeTab;ctxRow.remove();recalcTotals(idx);}hideCtx();}
function hideCtx(){document.getElementById('ctxMenu').classList.remove('show');ctxRow=null;}
function toggleEdit(){
editMode=!editMode;
const btn=document.getElementById('et');
btn.textContent=editMode?'DESATIVAR EDI\u00C7\u00C3O':'ATIVAR MODO EDI\u00C7\u00C3O';
btn.style.borderColor=editMode?'#d4a84b':'#2a4a6a';
btn.style.color=editMode?'#d4a84b':'#8ac';
document.querySelectorAll('tbody td:not(:last-child)').forEach(td=>{
td.contentEditable=editMode;if(!editMode)td.style.outline='';
else td.style.outline='1px dashed #1a3a5a';
});
}
function parseMoney(s){if(!s||s==='-')return 0;return parseFloat(s.replace(/[R$\s.]/g,'').replace(',','.'))}
function fmtMoney(n){return'R$ '+n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function recalcTotals(sheetIdx){
const sheet=document.querySelector('#sheet-'+sheetIdx);
if(!sheet)return;
const rows=sheet.querySelectorAll('tbody tr');
const sums={};
MONEY_COLS.forEach(i=>sums[i]=0);
rows.forEach(tr=>{
const cells=tr.querySelectorAll('td');
MONEY_COLS.forEach(i=>{if(cells[i])sums[i]+=parseMoney(cells[i].textContent);});
});
sheet.querySelectorAll('tfoot [data-total-col]').forEach(td=>{
const col=parseInt(td.dataset.totalCol);
td.textContent=fmtMoney(sums[col]||0);
});
}
function saveData(){
document.getElementById('ud').textContent=new Date().toLocaleString('pt-BR');
document.querySelectorAll('tbody td').forEach(td=>{td.contentEditable='false';td.style.outline='';});
const data={client:document.getElementById('cn').value,tabs:[]};
TABS.forEach((_,i)=>{
const rows=[];
document.querySelectorAll('#sheet-'+i+' tbody tr').forEach(tr=>{
const cells=[];tr.querySelectorAll('td:not(:last-child)').forEach(td=>cells.push(td.textContent));rows.push(cells);
});
data.tabs.push(rows);
});
localStorage.setItem('bkz_carteira_v6',JSON.stringify(data));
alert('Altera\u00E7\u00F5es salvas!');
recalcAllTotals();
}
function recalcAllTotals(){TABS.forEach((_,i)=>recalcTotals(i));}
function loadSaved(){
const raw=localStorage.getItem('bkz_carteira_v6');if(!raw)return;
try{
const data=JSON.parse(raw);
if(data.client)document.getElementById('cn').value=data.client;
data.tabs.forEach((rows,i)=>{
rows.forEach(cells=>{
const tr=addRow(i);
cells.forEach((val,j)=>{const tds=tr.querySelectorAll('td');if(tds[j]&&j<16)tds[j].textContent=val;});
});
});
recalcAllTotals();
}catch(e){console.error('Erro ao carregar:',e);}
}
function exportExcel(){
let csv='\uFEFF';
TABS.forEach((name,i)=>{
csv+=name+'\n';
csv+=COLS.slice(0,-1).join(';')+'\n';
document.querySelectorAll('#sheet-'+i+' tbody tr').forEach(tr=>{
const cells=[];tr.querySelectorAll('td:not(:last-child)').forEach(td=>cells.push(td.textContent));csv+=cells.join(';')+'\n';
});
csv+='\n';
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='carteira_bkz_'+document.getElementById('cn').value.replace(/\s/g,'_')+'_'+(new Date().toISOString().slice(0,10))+'.csv';
a.click();
}
function sendToClient(){alert('Fun\u00E7\u00E3o de envio por e-mail ser\u00E1 integrada em breve.');}
function importAssets(){
const input=document.createElement('input');
input.type='file';input.accept='image/*,.pdf,.xlsx,.csv';
input.onchange=e=>{
const file=e.target.files[0];if(!file)return;
alert('Arquivo "'+file.name+'" selecionado.\nO processamento OCR ir\u00E1 preencher a tabela automaticamente.');
};
input.click();
}
function newClient(){
if(confirm('Criar novo cliente? Dados n\u00E3o salvos ser\u00E3o perdidos.')){
document.getElementById('cn').value='';
document.querySelectorAll('tbody').forEach(tb=>tb.innerHTML='');
recalcAllTotals();
}
}
window.onload=()=>{init();loadSaved();};
</script>
</body>
</html>
